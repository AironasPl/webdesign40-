<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game N Go - Contact</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #2b2b2b, #1f1f1f);
        color: #ddd;
    }

    
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background-color: #2a2a2a;
    }

    header h1 {
        margin: 0;
    }

    
    nav {
        display: flex;
        gap: 25px;
    }

    nav a {
        color: #aaa;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    nav a:hover {
        color: #7CFC00;
    }

    .active {
        color: #7CFC00;
        border-bottom: 2px solid #7CFC00;
        padding-bottom: 4px;
    }

    
    .contact-container {
        max-width: 900px;
        margin: 60px auto;
        padding: 20px;
        text-align: center;
    }

    .contact-container h2 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    .contact-container p {
        color: #aaa;
        margin-bottom: 30px;
    }

    
    form {
        background-color: #2a2a2a;
        padding: 30px;
        border-radius: 8px;
        text-align: left;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        color: #ccc;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background-color: #1f1f1f;
        color: white;
    }

    input:focus, textarea:focus {
        outline: 2px solid #7CFC00;
    }

    textarea {
        resize: none;
        height: 120px;
    }

    
    button {
        width: 100%;
        padding: 12px;
        background-color: #66cc33;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        border-radius: 5px;
    }

    button:hover {
        background-color: #7CFC00;
        color: black;
    }

    
    .contact-info {
        margin-top: 30px;
        color: #aaa;
        font-size: 14px;
    }
</style>
</head>
<body>

<header>
    <h1>🎮 Game N Go</h1>
    <nav>
        <a href="indexreal.html">Home</a>
        <a href="abtpg.html">About</a>
        <a href="shoppingpg.html">Products</a>
        <a href="compagepro.html">Community</a>
        <a href="#" class="active">Contact</a>
    </nav>
</header>

<div class="contact-container">
    <h2>Contact Us</h2>
    <p>Have questions, feedback, or need help? Send us a message!</p>

    <form>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
        <p>Email: support@gamengo.com</p>
        <p>Follow us on social media for updates and events.</p>
    </div>
</div>

</body>
</html>
